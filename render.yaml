# Render Blueprint: deploy as Web Service (free tier).
# 1. Connect this repo to Render, create a Web Service from it.
# 2. Add a PostgreSQL database (e.g. Neon free tier) and set DATABASE_URL in Render env.
# 3. Set TELEGRAM_BOT_TOKEN and BOT_WEBHOOK_URL (your Render service URL, no trailing slash).
services:
  - type: web
    name: foodtracker
    runtime: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn webapp.server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_WEBHOOK_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FOOD_AI_PROVIDER
        value: mock
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
